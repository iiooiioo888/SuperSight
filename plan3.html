<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>硬件十年計劃 · Dashboard v7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   THEME VARIABLES
   ═══════════════════════════════════════════ */
[data-theme="dark"] {
  --bg:#08090c;--bg2:rgba(17,19,26,.88);--bg3:#131520;--bg4:#1a1d2e;
  --glass:rgba(26,29,46,.6);--accent:#e8a830;--accent2:#d49520;--accent-t:rgba(232,168,48,.15);
  --txt:#f0ece4;--txt2:#a8a29e;--txt3:#5f5b56;
  --red:#e85454;--red-t:rgba(232,84,84,.12);--grn:#4ae88a;--grn-t:rgba(74,232,138,.12);
  --blu:#5a9ee8;--blu-t:rgba(90,158,232,.12);--pur:#a88aee;--pur-t:rgba(168,138,238,.1);
  --brd:rgba(255,255,255,.06);--brd2:rgba(232,168,48,.2);
  --noise:.018;--shadow:0 8px 32px rgba(0,0,0,.3);
}
[data-theme="light"] {
  --bg:#f5f3ef;--bg2:rgba(255,255,255,.88);--bg3:#edeae5;--bg4:#e8e5df;
  --glass:rgba(255,255,255,.7);--accent:#b87a10;--accent2:#a06a08;--accent-t:rgba(184,122,16,.12);
  --txt:#1a1816;--txt2:#6b6560;--txt3:#9e9890;
  --red:#c03030;--red-t:rgba(192,48,48,.1);--grn:#20a060;--grn-t:rgba(32,160,96,.1);
  --blu:#2870c0;--blu-t:rgba(40,112,192,.1);--pur:#7050c0;--pur-t:rgba(112,80,192,.08);
  --brd:rgba(0,0,0,.08);--brd2:rgba(184,122,16,.25);
  --noise:.03;--shadow:0 4px 16px rgba(0,0,0,.08);
}

/* ═══════════════════════════════════════════
   BASE
   ═══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Source Serif 4',Georgia,serif;background:var(--bg);color:var(--txt);line-height:1.7;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 10% 5%,rgba(232,168,48,.04) 0%,transparent 45%),radial-gradient(ellipse at 90% 90%,rgba(90,158,232,.03) 0%,transparent 45%);pointer-events:none;z-index:0}

/* ═══════════════════════════════════════════
   NAV
   ═══════════════════════════════════════════ */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg2);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:1px solid var(--brd)}
.nav-in{max-width:1400px;margin:0 auto;display:flex;align-items:center;height:56px;padding:0 1.2rem;gap:.8rem}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;background:linear-gradient(135deg,var(--accent),#f0c060);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;flex-shrink:0}
.pill{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;flex:1;justify-content:center;background:var(--bg3);border-radius:8px;padding:3px;min-width:0}
.pill::-webkit-scrollbar{display:none}
.pt{font-family:'DM Mono',monospace;font-size:.62rem;font-weight:400;letter-spacing:.03em;color:var(--txt3);background:none;border:none;padding:.38rem .7rem;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all .25s}
.pt:hover{color:var(--txt2);background:rgba(128,128,128,.08)}
.pt.on{color:var(--bg);background:var(--accent);font-weight:500;box-shadow:0 2px 8px rgba(232,168,48,.3)}
.nav-tools{display:flex;gap:.4rem;flex-shrink:0}
.nbtn{width:32px;height:32px;border-radius:7px;border:1px solid var(--brd);background:var(--bg3);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .2s}
.nbtn:hover{border-color:var(--brd2);color:var(--accent)}

/* ═══════════════════════════════════════════
   PANELS
   ═══════════════════════════════════════════ */
main{position:relative;z-index:1;padding-top:56px}
.panel{display:none;animation:fp .35s ease both;max-width:1400px;margin:0 auto;padding:2rem 1.5rem 4rem}
.panel.on{display:block}
@keyframes fp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ═══════════════════════════════════════════
   SHARED COMPONENTS
   ═══════════════════════════════════════════ */
.sh{margin-bottom:1.8rem}
.sn{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem}
.sn::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--brd2),transparent);max-width:200px}
.sh h2{font-family:'Syne',sans-serif;font-weight:700;font-size:clamp(1.3rem,3vw,2rem);line-height:1.15}
.sh p{margin-top:.4rem;color:var(--txt2);max-width:600px;font-size:.88rem}

/* KPI Strip */
.ks{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:1px;background:var(--brd);border-radius:14px;overflow:hidden;border:1px solid var(--brd);margin-bottom:2rem}
.kp{background:var(--bg2);padding:1.1rem 1.2rem;transition:background .3s}
.kp:hover{background:var(--accent-t)}
.kv{font-family:'Syne',sans-serif;font-weight:700;font-size:1.4rem;background:linear-gradient(135deg,var(--accent),#f0c060);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.kl{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);margin-top:.15rem}

/* Architecture */
.aw{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--brd);border-radius:14px;padding:1.8rem;margin:1.2rem 0;position:relative;overflow:hidden}
.aw::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.4}
.ar{display:flex;justify-content:center;gap:.8rem;margin-bottom:.8rem;flex-wrap:wrap}
.ab{border:1px solid var(--brd);border-radius:10px;padding:.6rem .9rem;text-align:center;min-width:135px;background:var(--bg3);transition:all .3s}
.ab:hover{border-color:var(--accent);box-shadow:0 0 20px rgba(232,168,48,.08)}
.ab.hl{border-color:var(--accent);background:var(--accent-t)}
.ab .a1{font-family:'DM Mono',monospace;font-size:.46rem;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:.1rem}
.ab .a2{font-family:'Syne',sans-serif;font-weight:600;font-size:.72rem;color:var(--txt)}
.ab .a3{font-family:'DM Mono',monospace;font-size:.46rem;color:var(--txt3);margin-top:.08rem}
.aa{text-align:center;color:var(--txt3);font-family:'DM Mono',monospace;font-size:.56rem;padding:.15rem 0;letter-spacing:.04em}

/* Burden Strip */
.bs{display:flex;gap:1px;background:var(--brd);border:1px solid var(--brd);border-radius:10px;overflow:hidden;margin:1.2rem 0}
.bp{flex:1;background:var(--bg2);padding:.7rem .5rem;text-align:center;transition:background .3s}
.bp:hover{background:var(--accent-t)}
.bp .bpl{font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-bottom:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bp .bpv{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;background:linear-gradient(135deg,var(--accent),#f0c060);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bp .bps{font-family:'DM Mono',monospace;font-size:.45rem;color:var(--txt3);margin-top:.08rem}

/* Next Action */
.na{background:linear-gradient(135deg,var(--bg4),var(--bg3));border:1px solid var(--brd2);border-radius:12px;padding:1.1rem 1.3rem;margin:1.2rem 0;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;position:relative;overflow:hidden}
.na::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5}
.nai{width:40px;height:40px;border-radius:50%;background:var(--accent-t);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.nat{flex:1;min-width:160px}
.nal{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:.08rem}
.nah{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem}
.nac{font-family:'DM Mono',monospace;font-size:.78rem;font-weight:500;color:var(--accent);white-space:nowrap}

/* Alert */
.al{border-radius:10px;padding:.8rem 1rem;margin:.8rem 0;display:flex;align-items:flex-start;gap:.6rem;font-size:.76rem;line-height:1.6}
.al-r{background:var(--red-t);border:1px solid rgba(232,84,84,.15);color:var(--txt2)}
.al-w{background:var(--accent-t);border:1px solid var(--brd2);color:var(--txt2)}
.al i{font-size:.9rem;flex-shrink:0;margin-top:.05rem}
.al strong{color:var(--red)}
.al em{color:var(--accent);font-style:normal}

/* Note Box */
.nb{background:var(--glass);border:1px solid var(--brd);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:.8rem 1rem;margin:.8rem 0;font-size:.78rem;color:var(--txt2);line-height:1.7}
.nb strong{color:var(--txt)}

/* Badge */
.bg{display:inline-block;font-family:'DM Mono',monospace;font-size:.48rem;font-weight:500;letter-spacing:.07em;text-transform:uppercase;padding:.07rem .32rem;border-radius:3px}
.bg-r{color:var(--red);background:var(--red-t)}.bg-y{color:var(--accent);background:var(--accent-t)}.bg-g{color:var(--grn);background:var(--grn-t)}.bg-b{color:var(--blu);background:var(--blu-t)}.bg-p{color:var(--pur);background:var(--pur-t)}

/* Hardware Blocks */
.hw-sec{margin-bottom:2rem}
.hw-sec-t{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;padding:.6rem 0;border-bottom:2px solid var(--accent);margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
.hw-sec-t .ic{width:24px;height:24px;border-radius:6px;background:var(--accent-t);display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
.hw-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:.7rem}
.bk{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--brd);border-radius:10px;overflow:hidden;transition:border-color .3s}
.bk:hover{border-color:var(--brd2)}
.bk-h{padding:.8rem 1rem .4rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;gap:.4rem}
.bk-h h4{font-family:'Syne',sans-serif;font-weight:600;font-size:.82rem;flex:1}
.bk-h .bgs{display:flex;gap:.2rem;flex-shrink:0}
.bk-h .bi{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--txt3);transition:transform .3s;flex-shrink:0}
.bk.open .bk-h .bi{transform:rotate(45deg)}
.bk-c{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1)}
.bk.open .bk-c{max-height:1800px}
.bk-i{padding:0 1rem 1rem}

/* Spec Table */
.st{width:100%;border-collapse:collapse;font-size:.76rem}
.st td{padding:.28rem 0;border-bottom:1px solid var(--brd);vertical-align:top}
.st td:first-child{color:var(--txt3);font-family:'DM Mono',monospace;font-size:.65rem;white-space:nowrap;width:36%;padding-right:.5rem}
.st td:last-child{color:var(--txt);font-weight:500}
.st tr:last-child td{border-bottom:none}
.st .hl{color:var(--accent);font-weight:600}
.st .dim{color:var(--txt3);font-style:italic;font-size:.7rem}
.st .ok{color:var(--grn)}

/* Comparison Table */
.cw{overflow-x:auto;border:1px solid var(--brd);border-radius:11px;background:var(--bg2);margin:.8rem 0}
.cw table{width:100%;border-collapse:collapse;font-size:.72rem;min-width:680px}
.cw thead{background:var(--bg3)}
.cw th{font-family:'DM Mono',monospace;font-weight:500;font-size:.54rem;letter-spacing:.07em;text-transform:uppercase;color:var(--txt3);text-align:left;padding:.55rem .65rem;border-bottom:1px solid var(--brd);white-space:nowrap}
.cw td{padding:.48rem .65rem;border-bottom:1px solid var(--brd);color:var(--txt2);vertical-align:top}
.cw tr:last-child td{border-bottom:none}
.cw td:first-child{color:var(--txt);font-weight:500}
.cw tr:hover td{background:var(--accent-t)}
.cw .hi{background:var(--accent-t)!important}
.cw .pr{font-family:'DM Mono',monospace;font-weight:500;color:var(--accent)}

/* Service Table */
.sv{width:100%;border-collapse:collapse;font-size:.72rem;margin:.6rem 0}
.sv th{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.07em;text-transform:uppercase;color:var(--txt3);text-align:left;padding:.4rem .5rem;border-bottom:1px solid var(--brd);background:var(--bg3)}
.sv td{padding:.35rem .5rem;border-bottom:1px solid var(--brd);color:var(--txt2)}
.sv td:first-child{color:var(--txt);font-weight:500}
.sv tr:last-child td{border-bottom:none}

/* Grand Total */
.gt{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--brd2);border-radius:14px;overflow:hidden;margin-top:1.5rem;position:relative}
.gt::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5}
.gt table{width:100%;border-collapse:collapse;font-size:.78rem}
.gt thead{background:var(--bg4)}
.gt th{font-family:'DM Mono';font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);text-align:left;padding:.55rem .9rem;border-bottom:1px solid var(--brd)}
.gt td{padding:.45rem .9rem;border-bottom:1px solid var(--brd);color:var(--txt2)}
.gt tr:last-child td{border-bottom:none}
.gt td:first-child{color:var(--txt);font-weight:500}
.gt .pr{font-family:'DM Mono';font-weight:500;color:var(--accent)}
.gt .gr{background:var(--accent-t)}
.gt .gr td{padding:.55rem .9rem;font-weight:700;color:var(--txt);border-bottom:none}
.gt .gr .pr{font-family:'Syne';font-size:.95rem}

/* ═══════════════════════════════════════════
   INSTALL GUIDE (Hardware Tab)
   ═══════════════════════════════════════════ */
.ig-section{margin:1.5rem 0}
.ig-section h3{font-family:'Syne';font-weight:700;font-size:1rem;margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
.ig-step{background:var(--glass);border:1px solid var(--brd);border-radius:10px;padding:1rem 1.2rem;margin-bottom:.6rem;position:relative;padding-left:3rem}
.ig-step::before{content:attr(data-n);position:absolute;left:1rem;top:1rem;width:1.5rem;height:1.5rem;border-radius:50%;background:var(--accent-t);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:'DM Mono';font-size:.6rem;font-weight:500;color:var(--accent)}
.ig-step h4{font-family:'Syne';font-weight:600;font-size:.85rem;margin-bottom:.3rem}
.ig-step p{font-size:.78rem;color:var(--txt2);line-height:1.6}
.ig-step code{font-family:'DM Mono';font-size:.7rem;background:var(--bg3);padding:.1rem .4rem;border-radius:4px;color:var(--accent);display:inline-block;margin:.15rem 0}

/* ═══════════════════════════════════════════
   TIMELINE
   ═══════════════════════════════════════════ */
/* Gantt Chart */
.gantt{background:var(--glass);border:1px solid var(--brd);border-radius:14px;padding:1.5rem;margin:1.5rem 0;overflow-x:auto}
.gantt svg{width:100%;height:auto;display:block;min-width:700px}
.g-bar{rx:4;cursor:pointer;transition:opacity .2s}
.g-bar:hover{opacity:.85}
.g-label{font-family:'DM Mono',monospace;font-size:10px;fill:var(--txt)}
.g-year{font-family:'DM Mono',monospace;font-size:10px;fill:var(--txt3);text-anchor:middle}
.g-mile{cursor:pointer;transition:r .2s}
.g-mile:hover{r:7}

/* Phase/Year Tabs */
.pt-bar{display:flex;gap:0;margin:1.5rem 0 .4rem;border-radius:10px;overflow:hidden;border:1px solid var(--brd)}
.pts{flex:1;padding:.55rem .4rem;text-align:center;background:var(--bg3);border-right:1px solid var(--bg);transition:all .3s;cursor:pointer;position:relative}
.pts:last-child{border-right:none}
.pts:hover{background:var(--bg4)}
.pts.on{background:var(--accent-t)}
.pts.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--accent)}
.pts .p1{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--accent)}
.pts .p2{font-family:'Syne',sans-serif;font-size:.62rem;font-weight:600;color:var(--txt);margin-top:.08rem}
.yt-bar{display:flex;gap:0;margin:0 0 .8rem;border-radius:7px;overflow:hidden;border:1px solid var(--brd);background:var(--bg3)}
.yt{flex:1;padding:.35rem .2rem;text-align:center;background:transparent;border-right:1px solid rgba(128,128,128,.06);transition:all .3s;cursor:pointer;font-family:'DM Mono',monospace;font-size:.54rem;color:var(--txt3)}
.yt:last-child{border-right:none}
.yt:hover{color:var(--txt2);background:rgba(128,128,128,.05)}
.yt.on{color:var(--accent);background:var(--accent-t);font-weight:500}

/* Month Cards */
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:.5rem;margin-bottom:1.2rem}
.mc2{background:var(--glass);border:1px solid var(--brd);border-radius:9px;padding:.8rem .9rem;transition:all .3s}
.mc2:hover{border-color:var(--brd2);transform:translateY(-1px)}
.mc2 .mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
.mc2 .ml{font-family:'DM Mono';font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.mc2 .mt{font-family:'DM Mono';font-size:.44rem;letter-spacing:.05em;text-transform:uppercase;padding:.06rem .28rem;border-radius:3px}
.tg-b{color:var(--red);background:var(--red-t)}.tg-m{color:var(--blu);background:var(--blu-t)}.tg-s{color:var(--grn);background:var(--grn-t)}.tg-d{color:var(--pur);background:var(--pur-t)}.tg-r{color:var(--accent);background:var(--accent-t)}.tg-n{color:var(--txt3);background:rgba(128,128,128,.08)}
.mc2 .mtitle{font-family:'Syne';font-weight:600;font-size:.78rem;margin-bottom:.2rem;line-height:1.25}
.mc2 .mdesc{font-size:.72rem;color:var(--txt2);line-height:1.5;margin-bottom:.35rem}
.mc2 .mcosts{display:flex;gap:.25rem;flex-wrap:wrap}
.tc{font-family:'DM Mono';font-size:.52rem;font-weight:500;padding:.1rem .35rem;border-radius:4px}
.tc-o{background:var(--accent-t);color:var(--accent)}.tc-r{background:var(--red-t);color:var(--red)}.tc-g{background:var(--grn-t);color:var(--grn)}.tc-b{background:var(--blu-t);color:var(--blu)}

/* Phase Summary */
.ps-box{background:var(--glass);border:1px solid var(--brd2);border-radius:14px;padding:1.5rem;margin-top:.8rem;position:relative;overflow:hidden}
.ps-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5}
.ps-t{font-family:'Syne';font-weight:700;font-size:1.1rem;color:var(--accent);margin-bottom:.15rem}
.ps-s{font-family:'DM Mono';font-size:.58rem;color:var(--txt3);letter-spacing:.08em;margin-bottom:.6rem}
.ps-b{font-size:.82rem;color:var(--txt2);line-height:1.7;margin-bottom:.6rem}
.ps-st{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.5rem}
.ps-sti{background:var(--bg3);border:1px solid var(--brd);border-radius:8px;padding:.5rem .7rem;text-align:center}
.ps-sti .sv2{font-family:'Syne';font-weight:700;font-size:.95rem;color:var(--accent)}
.ps-sti .sl{font-family:'DM Mono';font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);margin-top:.1rem}

/* ═══════════════════════════════════════════
   CHART & FINANCIAL
   ═══════════════════════════════════════════ */
.cc{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--brd);border-radius:14px;padding:1.2rem;margin:1.2rem 0;position:relative;overflow:hidden}
.cc svg{width:100%;height:auto;display:block}
.c-line{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.c-grid{stroke:var(--brd);stroke-width:1}
.c-lbl{font-family:'DM Mono',monospace;font-size:10px;fill:var(--txt3)}
.c-dot{fill:var(--accent);stroke:var(--bg3);stroke-width:2;cursor:pointer;transition:r .2s}
.c-dot:hover{r:7}

function renderGantt(){
  // SVG Gantt chart
  const L=60,R=760,T=20,B=60,W=R-L;
  const phases=[
    {start:0,end:20,label:'建設期',color:'var(--accent)'},
    {start:21,end:60,label:'維護 I',color:'var(--blu)'},
    {start:60,end:72,label:'★ 刷新 I',color:'var(--red)'},
    {start:73,end:108,label:'維護 II',color:'var(--blu)'},
    {start:108,end:120,label:'★ 刷 II',color:'var(--red)'}
  ];
  const milestones=[
    {m:0,label:'開始',color:'var(--accent)'},
    {m:20,label:'建設完成',color:'var(--grn)'},
    {m:36,label:'換水冷',color:'var(--red)'},
    {m:48,label:'換電源',color:'var(--red)'},
    {m:60,label:'刷新 I',color:'var(--accent)'},
    {m:84,label:'換水冷',color:'var(--red)'},
    {m:108,label:'刷新 II',color:'var(--accent)'},
    {m:120,label:'完成',color:'var(--grn)'}
  ];
  let svg=`<svg viewBox="0 0 820 120">`;
  // Year labels
  for(let y=0;y<=10;y++){
    const x=L+(y/10)*W;
    svg+=`<line x1="${x}" y1="${T}" x2="${x}" y2="${B}" stroke="var(--brd)" stroke-width="1"/>`;
    svg+=`<text x="${x}" y="${B+14}" class="g-year">Y${y}</text>`;
  }
  // Phase bars
  phases.forEach((p,i)=>{
    const x1=L+(p.start/120)*W, x2=L+(p.end/120)*W;
    svg+=`<rect x="${x1}" y="${T+5+i*9}" width="${x2-x1}" height="7" fill="${p.color}" opacity=".6" class="g-bar" rx="3">
      <title>${p.label}: M${p.start}-M${p.end}</title></rect>`;
    svg+=`<text x="${x1+4}" y="${T+11+i*9}" class="g-label" fill="var(--bg)" font-size="5">${p.label}</text>`;
  });
  // Milestones
  milestones.forEach(ms=>{
    const x=L+(ms.m/120)*W;
    svg+=`<circle cx="${x}" cy="${T+55}" r="4" fill="${ms.color}" class="g-mile"><title>M${ms.m}: ${ms.label}</title></circle>`;
    svg+=`<text x="${x}" y="${T+68}" class="g-year" font-size="7">${ms.label}</text>`;
  });
  svg+=`</svg>`;
  return `<div class="gantt">${svg}</div>`;
}

function rPT(){document.getElementById('ptab').innerHTML=PH.map((p,i)=>`<div class="pts ${i===cP?'on':''}" onclick="sP(${i})"><div class="p1">${p.m}</div><div class="p2">${p.n}</div></div>`).join('');}

function rMG(){const g=document.getElementById('mgrid'),es=Object.entries(MD).filter(([i,d])=>d.p===cP&&d.y===cY).sort(([a],[b])=>+a-+b);if(!es.length){g.innerHTML='<div style="color:var(--txt3);font-size:.8rem;padding:1.5rem;text-align:center">持續監測中。</div>';return;}g.innerHTML=es.map(([i,d])=>{const tc={b:'tg-b',m:'tg-m',s:'tg-s',d:'tg-d',r:'tg-r',n:'tg-n'}[d.t]||'tg-n';const tl={b:'採購',m:'維護',s:'存款',d:'部署',r:'刷新',n:'監測'}[d.t]||'';return`<div class="mc2"><div class="mh"><span class="ml">M${i}</span><span class="mt ${tc}">${tl}</span></div><div class="mtitle">${d.ti}</div><div class="mdesc">${d.d}</div><div class="mcosts">${d.c.map(x=>`<span class="tc tc-${x.k==='r'?'r':x.k}">${x.t} ${x.v}</span>`).join('')}</div></div>`;}).join('');}

function animChart(){
  const svg=document.getElementById('fc');if(!svg||svg.dataset.done)return;svg.dataset.done='1';
  const d=[{y:0,v:0},{y:1,v:0},{y:2,v:12088},{y:3,v:48688},{y:4,v:86448},{y:5,v:125248},{y:6,v:114448},{y:7,v:153448},{y:8,v:193648},{y:9,v:232448},{y:10,v:235000}];
  const MX=250000,L=55,R=760,T=30,B=275,W=R-L,H=B-T;
  const X=i=>L+(i/10)*W,Y=v=>B-(v/MX)*H;
  let h='<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8a830" stop-opacity=".25"/><stop offset="100%" stop-color="#e8a830" stop-opacity="0"/></linearGradient></defs>';
  for(let i=0;i<=5;i++){const y=B-(i/5)*H;h+=`<line x1="${L}" y1="${y}" x2="${R}" y2="${y}" class="c-grid"/><text x="${L-6}" y="${y+4}" class="c-lbl" text-anchor="end">${Math.round(MX*i/5/1000)}k</text>`;}
  for(let i=0;i<=10;i++)h+=`<text x="${X(i)}" y="${B+18}" class="c-lbl" text-anchor="middle">Y${i}</text>`;
  h+=`<line x1="${X(5)}" y1="${T}" x2="${X(5)}" y2="${B}" class="c-ev"/><text x="${X(5)+5}" y="${T+12}" class="c-evl">刷新 I</text>`;
  h+=`<line x1="${X(10)}" y1="${T}" x2="${X(10)}" y2="${B}" class="c-ev"/><text x="${X(10)-5}" y="${T+12}" class="c-evl" text-anchor="end">刷新 II</text>`;
  let ap=`M${X(0)},${Y(0)}`;d.forEach(p=>ap+=`L${X(p.y)},${Y(p.v)}`);ap+=`L${X(10)},${B}L${X(0)},${B}Z`;
  h+=`<path d="${ap}" fill="url(#cg)" opacity=".15"/>`;
  let lp=`M${X(0)},${Y(0)}`;d.forEach(p=>lp+=`L${X(p.y)},${Y(p.v)}`);
  h+=`<path d="${lp}" class="c-line" stroke-dasharray="900" stroke-dashoffset="900" style="transition:stroke-dashoffset 2s ease"/>`;
  d.forEach(p=>{h+=`<circle cx="${X(p.y)}" cy="${Y(p.v)}" r="5" class="c-dot" data-v="${p.v}" data-y="${p.y}"/><text x="${X(p.y)}" y="${Y(p.v)-12}" class="c-vl" text-anchor="middle">¥${p.v.toLocaleString()}</text>`;});
  svg.innerHTML=h;
  requestAnimationFrame(()=>{svg.querySelector('.c-line').style.strokeDashoffset='0';});
  setTimeout(()=>{svg.querySelectorAll('.c-vl').forEach(t=>t.style.opacity='1');},2200);
  const tip=document.getElementById('tt');
  svg.querySelectorAll('.c-dot').forEach(dot=>{
    dot.onmouseenter=()=>{tip.textContent=`Year ${dot.dataset.y}: ¥${parseInt(dot.dataset.v).toLocaleString()}`;tip.style.opacity='1';const r=document.getElementById('cc').getBoundingClientRect(),dr=dot.getBoundingClientRect();tip.style.left=(dr.left-r.left+dr.width/2-tip.offsetWidth/2)+'px';tip.style.top=(dr.top-r.top-30)+'px';};
    dot.onmouseleave=()=>tip.style.opacity='0';
  });
}

function animCnt(){
  document.querySelectorAll('.kv[data-count]').forEach(el=>{
    const t=parseInt(el.dataset.count),pfx=el.dataset.prefix||'',sfx=el.dataset.suffix||'',s=performance.now(),d=1200;
